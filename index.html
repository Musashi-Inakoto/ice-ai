<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍦 Ice Cream AI Chat</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-ice-cream"></i>
                    <h1>Ice Cream AI</h1>
                </div>
                <div class="header-controls">
                    <div class="user-info" id="userInfo">
                        <div class="user-avatar">U</div>
                        <span class="user-name">User</span>
                    </div>
                    <button class="logout-btn" id="logoutBtn" title="Logout">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                    <button class="theme-toggle" id="themeToggle">
                        <i class="fas fa-palette"></i>
                    </button>
                    <button class="clear-chat" id="clearChat">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="chat-main">
            <div class="chat-messages" id="chatMessages">
                <div class="welcome-message">
                    <div class="ice-cream-icon">🍨</div>
                    <h2>Welcome to Ice Cream AI!</h2>
                    <p>Your sweet companion for all questions. How can I help you today?</p>
                </div>
            </div>

            <div class="typing-indicator" id="typingIndicator" style="display: none;">
                <div class="typing-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <span class="typing-text">AI is thinking...</span>
            </div>
        </main>

        <footer class="chat-footer">
            <form class="message-form" id="messageForm">
                <div class="input-container">
                    <button type="button" class="attachment-btn" id="attachmentBtn">
                        <i class="fas fa-paperclip"></i>
                    </button>
                    <input 
                        type="text" 
                        class="message-input" 
                        id="messageInput" 
                        placeholder="Ask me anything sweet..."
                        autocomplete="off"
                    >
                    <button type="submit" class="send-btn" id="sendBtn">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </form>
            <div class="footer-info">
                <span class="model-info">Powered by OpenRouter API</span>
            </div>
        </footer>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
